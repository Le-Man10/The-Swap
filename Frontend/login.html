<!DOCTYPE html>
<html lang="en">
<head>

  <title>Login</title>
</head>
<body>

  <p id="error-msg" style="color:rgb(110, 37, 255);"></p>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
